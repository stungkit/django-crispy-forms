[tox]
envlist =
    {py310,py311}-django{52},
    {py312}-django{52,60,-latest},
    {py313}-django{52,60,-latest},
    {py314}-django{52,60,-latest},
    lint

[testenv]
deps =
    django52: django>=5.2a,<6.0
    django60: django>=6.0a,<6.1
    django-latest: https://github.com/django/django/archive/main.tar.gz
    -rrequirements/testing.txt
allowlist_externals = make
commands = python -W error::DeprecationWarning -W error::PendingDeprecationWarning -m pytest {posargs} --cov=crispy_forms
ignore_outcome =
    django-latest: True
setenv =
    PYTHONDONTWRITEBYTECODE=1

[testenv:lint]
skip_install = true
commands =
    black . --check
    isort . --check --dif
    flake8 crispy_forms tests
deps =
    -rrequirements/lint.txt

[flake8]
exclude =
    # The conf file is auto generated, ignore it
    docs/conf.py
max-line-length = 119
